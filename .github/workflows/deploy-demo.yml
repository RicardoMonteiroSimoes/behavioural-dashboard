name: Deploy demo

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run demo:build
        env:
          BASE_PATH: /behavioural-dashboard/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist
      - id: deployment
        uses: actions/deploy-pages@v4
